<!DOCTYPE html>
<html>
<head>
    <title>DevOps Project</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #38bdf8;
            color: black;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>DevOps Project 🚀</h1>
    <p id="status">Click button to check backend</p>
    <button onclick="getData()">Check Backend</button>
</div>

<script>
function getData() {
    fetch("http://13.62.51.34:3000/api")
    .then(res => res.json())
    .then(data => {
        document.getElementById("status").innerText = data.message;
    })
    .catch(() => {
        document.getElementById("status").innerText = "Error connecting to backend";
    });
}
</script>

</body>
</html>
